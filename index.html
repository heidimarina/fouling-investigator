// API CALL
// ═══════════════════════════════════════
async function callClaude(apiKey, model, systemPrompt, userMessage, maxTokens = 2000) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model,
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: "user", content: userMessage }],
    }),
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API error ${resp.status}: ${err}`);
  }
  const data = await resp.json();
  return data.content[0].text;
}

function Md({ text }) {
  const html = useMemo(() => {
    if (!text) return "";
    marked.setOptions({ breaks: true, gfm: true });
    return marked.parse(text);
  }, [text]);
  return <div className="md" dangerouslySetInnerHTML={{ __html: html }} />;
}

        <div>
          <label style={labelStyle}>Preliminary test results (if any)</label>
          <textarea value={form.prelimResults} onChange={e => set("prelimResults", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. Soluble in toluene but not heptane, ash content ~15%, high Fe by XRF screening" />
        </div>
      </div>

      <button onClick={handleSubmit} disabled={disabled || !hasSomething} style={{
        width: "100%", marginTop: 18, padding: "16px 20px", borderRadius: 10, border: "none",
        cursor: hasSomething && !disabled ? "pointer" : "not-allowed",
        fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 16, fontWeight: 700, letterSpacing: 0.5,
        color: "#0a1420",
        background: hasSomething && !disabled ? "linear-gradient(135deg, #e8c56a 0%, #d4a840 100%)" : "#1e2e3e",
        opacity: hasSomething && !disabled ? 1 : 0.5,
        transition: "all 0.2s ease",
      }}>
        🔬 Launch Investigation
      </button>
    </div>
  );
}

function AgentCard({ agent, status, result, isLead }) {
  const [expanded, setExpanded] = useState(false);
  const statusColors = { pending: "#3a4a5a", running: "#e8c56a", done: "#4ECDC4", error: "#FF6B6B" };
  const statusLabels = { pending: "Waiting", running: "Analysing...", done: "Complete", error: "Error" };

  return (
    <div style={{
      background: "rgba(255,255,255,0.03)", borderRadius: 10,
      border: `1px solid ${status === "done" ? agent.color + "33" : "#1e2e3e"}`,
      overflow: "hidden",
      transition: "border-color 0.3s ease",
    }}>
      <button onClick={() => result && setExpanded(!expanded)} style={{
        width: "100%", display: "flex", alignItems: "center", gap: 12,
        padding: "14px 18px", background: "transparent", border: "none",
        cursor: result ? "pointer" : "default", textAlign: "left",
      }}>
        <span style={{ fontSize: 20 }}>{agent.icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: agent.color }}>{agent.name}</div>
          {isLead && <div style={{ fontSize: 10, color: "#4a6a7a", marginTop: 2 }}>Synthesising all specialist analyses</div>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {status === "running" && (
            <div style={{ width: 14, height: 14, border: `2px solid ${agent.color}`, borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          )}
          <span style={{ fontSize: 11, fontWeight: 600, color: statusColors[status], textTransform: "uppercase", letterSpacing: 0.8 }}>
            {statusLabels[status]}
          </span>
          {result && (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a6a7a" strokeWidth="2" strokeLinecap="round"
              style={{ transition: "transform 0.2s", transform: expanded ? "rotate(180deg)" : "rotate(0)" }}>
              <polyline points="6 9 12 15 18 9" />
            </svg>
          )}
        </div>
      </button>
      {expanded && result && (
        <div style={{ padding: "0 18px 16px", borderTop: "1px solid #1e2e3e", paddingTop: 14, fontSize: 13, lineHeight: 1.7 }}>
          <Md text={result} />
        </div>
      )}
    </div>
  );
}

function SynthesisView({ result }) {
  if (!result) return null;
  return (
    <div style={{
      background: "rgba(232,197,106,0.03)", borderRadius: 12,
      border: "2px solid rgba(232,197,106,0.2)", padding: "24px",
      marginTop: 16,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <span style={{ fontSize: 22 }}>📋</span>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#e8c56a" }}>Investigation Report</div>
      </div>
      <div style={{ fontSize: 13, lineHeight: 1.7 }}>
        <Md text={result} />
      </div>
    </div>
  );
}

function InstrumentPanel() {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid #1e2e3e", overflow: "hidden", marginBottom: 16 }}>
      <button onClick={() => setOpen(!open)} style={{
        width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "12px 18px",
        background: "transparent", border: "none", cursor: "pointer", textAlign: "left",
      }}>
        <span style={{ fontSize: 14 }}>🔧</span>
        <span style={{ flex: 1, fontSize: 13, fontWeight: 600, color: "#8ab4d0" }}>Available Instruments & Methods</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a6a7a" strokeWidth="2" strokeLinecap="round"
          style={{ transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "rotate(0)" }}>
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>
      {open && (
        <div style={{ padding: "0 18px 16px", borderTop: "1px solid #1e2e3e", paddingTop: 12 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#4ECDC4", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Internal (preferred)</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 14 }}>
            {INTERNAL_INSTRUMENTS.map(i => (
              <span key={i} style={{ fontSize: 10, padding: "3px 8px", borderRadius: 4, background: "rgba(78,205,196,0.08)", border: "1px solid rgba(78,205,196,0.15)", color: "#8ab4d0", fontFamily: "'IBM Plex Mono', monospace" }}>{i.split(" — ")[0].split(" (")[0]}</span>
            ))}
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#FF6B6B", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>External (slower, flag early if needed)</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
            {EXTERNAL_INSTRUMENTS.map(i => (
              <span key={i} style={{ fontSize: 10, padding: "3px 8px", borderRadius: 4, background: "rgba(255,107,107,0.08)", border: "1px solid rgba(255,107,107,0.15)", color: "#c08080", fontFamily: "'IBM Plex Mono', monospace" }}>{i.split(" (")[0]}</span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════
// CLIPBOARD BRIEFING GENERATOR (Pro Plan mode)
// ═══════════════════════════════════════
function buildClaudeCodePrompt(sampleText) {
  return `Run a fouling investigation on this sample. Use the Fouling Investigator agent swarm: spawn 6 domain specialist agents IN PARALLEL (Organic Fouling Chemist, Inorganic/Corrosion Specialist, Process Engineer, Contamination/External Source Analyst, Crude/Feedstock Chemistry Specialist, Thermal/Catalytic Degradation Specialist), then synthesise their outputs with a Lead Investigator agent.

Each specialist should generate 2–4 theories with confidence ratings and recommended analytical tests. The Lead Investigator ranks theories, flags external lab needs early, and designs a phased analytical plan (Phase 1: quick screening → Phase 2: targeted confirmation → Phase 3: deep characterisation if needed). Prioritise internal methods first, fastest/easiest first.

FOULING SAMPLE INVESTIGATION BRIEF:

${sampleText}`;
}

// ═══════════════════════════════════════
// COPIED CONFIRMATION TOAST
// ═══════════════════════════════════════
function CopiedToast({ show }) {
  if (!show) return null;
  return (
    <div style={{
      position: "fixed", bottom: 30, left: "50%", transform: "translateX(-50%)",
      background: "#4ECDC4", color: "#0a1420", padding: "12px 24px", borderRadius: 10,
      fontSize: 14, fontWeight: 700, boxShadow: "0 4px 20px rgba(78,205,196,0.3)",
      zIndex: 9999, animation: "pulse 0.3s ease",
    }}>
      Copied to clipboard — paste into Claude Code
    </div>
  );
}

// ═══════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════
function App() {
  const [mode, setMode] = useState(() => {
    try { return localStorage.getItem("fi-mode") || "pro"; } catch { return "pro"; }
  });
  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem("fi-api-key") || ""; } catch { return ""; }
  });
  const [model, setModel] = useState(() => {
    try { return localStorage.getItem("fi-model") || "claude-sonnet-4-6-20250514"; } catch { return "claude-sonnet-4-6-20250514"; }
  });
  const [phase, setPhase] = useState("input"); // input | copied | analyzing | results
  const [sampleText, setSampleText] = useState("");
  const [agentStatuses, setAgentStatuses] = useState({});
  const [agentResults, setAgentResults] = useState({});
  const [synthesis, setSynthesis] = useState(null);
  const [error, setError] = useState(null);
  const [showCopied, setShowCopied] = useState(false);

  useEffect(() => { try { localStorage.setItem("fi-mode", mode); } catch {} }, [mode]);
  useEffect(() => { try { localStorage.setItem("fi-api-key", apiKey); } catch {} }, [apiKey]);
  useEffect(() => { try { localStorage.setItem("fi-model", model); } catch {} }, [model]);

  // Pro Plan mode: copy to clipboard
  const handleProSubmit = useCallback(async (text) => {
    setSampleText(text);
    const prompt = buildClaudeCodePrompt(text);
    try {
      await navigator.clipboard.writeText(prompt);
      setShowCopied(true);
      setTimeout(() => setShowCopied(false), 3000);
      setPhase("copied");
    } catch {
      setError("Could not copy to clipboard. Please copy the briefing manually.");
      setPhase("copied");
    }
  }, []);

  // API mode: direct agent calls
  const handleApiSubmit = useCallback(async (text) => {
    if (!apiKey) { setError("Please enter your Anthropic API key."); return; }
    setSampleText(text);
    setPhase("analyzing");
    setError(null);
    setSynthesis(null);

    const briefing = `FOULING SAMPLE INVESTIGATION BRIEF\n\n${text}\n\nAnalyse this sample. Provide your theories on what it is and how it formed. Recommend specific analytical tests from the available instruments.`;

    const initStatus = {};
    AGENTS.forEach(a => { initStatus[a.id] = "pending"; });
    initStatus.lead = "pending";
    setAgentStatuses(initStatus);
    setAgentResults({});

    const results = {};
    const promises = AGENTS.map(async (agent) => {
      setAgentStatuses(p => ({ ...p, [agent.id]: "running" }));
      try {
        const result = await callClaude(apiKey, model, agent.system, briefing, 2000);
        results[agent.id] = result;
        setAgentResults(p => ({ ...p, [agent.id]: result }));
        setAgentStatuses(p => ({ ...p, [agent.id]: "done" }));
      } catch (e) {
        results[agent.id] = `Error: ${e.message}`;
        setAgentResults(p => ({ ...p, [agent.id]: `Error: ${e.message}` }));
        setAgentStatuses(p => ({ ...p, [agent.id]: "error" }));
      }
    });

    await Promise.all(promises);

    setAgentStatuses(p => ({ ...p, lead: "running" }));
    try {
      const specialistInputs = AGENTS.map(a =>
        `## ${a.name} (${a.icon})\n${results[a.id] || "No response"}`
      ).join("\n\n---\n\n");

      const leadBriefing = `FOULING SAMPLE INVESTIGATION BRIEF\n\n${text}\n\n---\n\nSPECIALIST ANALYSES:\n\n${specialistInputs}\n\n---\n\nSynthesise all specialist analyses into a final investigation report. Rank the theories, design the analytical plan, and flag any external lab needs.`;

      const leadResult = await callClaude(apiKey, model, LEAD_SYSTEM, leadBriefing, 4000);
      setSynthesis(leadResult);
      setAgentStatuses(p => ({ ...p, lead: "done" }));
    } catch (e) {
      setSynthesis(`Error: ${e.message}`);
      setAgentStatuses(p => ({ ...p, lead: "error" }));
    }

    setPhase("results");
  }, [apiKey, model]);

  const resetInvestigation = () => {
    setPhase("input");
    setSampleText("");
    setAgentStatuses({});
    setAgentResults({});
    setSynthesis(null);
    setError(null);
  };

  const handleSubmit = mode === "pro" ? handleProSubmit : handleApiSubmit;

  const models = [
    { id: "claude-sonnet-4-6-20250514", label: "Sonnet 4.6 (fast, recommended)" },
    { id: "claude-opus-4-6-20250918", label: "Opus 4.6 (thorough, slower)" },
  ];

  const modeButtonStyle = (active) => ({
    padding: "8px 16px", borderRadius: 6, border: "1px solid " + (active ? "#e8c56a55" : "#1e2e3e"),
    background: active ? "rgba(232,197,106,0.1)" : "transparent",
    color: active ? "#e8c56a" : "#4a6a7a",
    cursor: "pointer", fontSize: 12, fontWeight: 600,
    fontFamily: "'IBM Plex Sans', sans-serif",
    transition: "all 0.2s ease",
  });

  return (
    <div style={{ minHeight: "100vh", background: "#0f1923" }}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

      <Header />
      <CopiedToast show={showCopied} />

      <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 60px" }}>

        {/* Mode selector */}
        <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid #1e2e3e", padding: "14px 18px", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "#8ab4d0", textTransform: "uppercase", letterSpacing: 1 }}>Mode</span>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setMode("pro")} style={modeButtonStyle(mode === "pro")}>
              Pro Plan — via Claude Code
            </button>
            <button onClick={() => setMode("api")} style={modeButtonStyle(mode === "api")}>
              API Key — direct calls
            </button>
          </div>
          <div style={{ fontSize: 11, color: "#3a5a6a", marginTop: 8, lineHeight: 1.6 }}>
            {mode === "pro"
              ? "Generates the investigation briefing and copies it to your clipboard. Paste it into Claude Code to run the agent swarm using your Pro subscription."
              : "Calls the Anthropic API directly from this app. Requires an API key and uses pay-per-token billing."}
          </div>
        </div>

        {/* API key — only in API mode */}
        {mode === "api" && <ApiKeyInput apiKey={apiKey} setApiKey={setApiKey} />}

        {/* Model selector — only in API mode */}
        {mode === "api" && (
          <div style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "center" }}>
            <span style={{ fontSize: 11, fontWeight: 600, color: "#4a6a7a", textTransform: "uppercase", letterSpacing: 0.8 }}>Model:</span>
            <select value={model} onChange={e => setModel(e.target.value)} style={{
              fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, padding: "6px 10px",
              border: "1px solid #1e2e3e", borderRadius: 6, background: "#0a1420", color: "#8ab4d0",
              outline: "none", cursor: "pointer",
            }}>
              {models.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
            </select>
          </div>
        )}

        <InstrumentPanel />

        {error && (
          <div style={{ background: "rgba(255,107,107,0.1)", border: "1px solid rgba(255,107,107,0.3)", borderRadius: 8, padding: "12px 16px", marginBottom: 16, fontSize: 13, color: "#FF6B6B" }}>
            {error}
          </div>
        )}

        {/* Input phase */}
        {phase === "input" && (
          <SampleForm onSubmit={handleSubmit} disabled={mode === "api" && !apiKey} />
        )}

        {/* Pro Plan: copied phase */}
        {phase === "copied" && mode === "pro" && (
          <div>
            <div style={{ background: "rgba(78,205,196,0.06)", borderRadius: 12, border: "2px solid rgba(78,205,196,0.2)", padding: "24px", marginBottom: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                <span style={{ fontSize: 22 }}>📋</span>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#4ECDC4" }}>Briefing Ready</div>
              </div>
              <div style={{ fontSize: 13, color: "#8ab4d0", lineHeight: 1.8, marginBottom: 16 }}>
                The investigation briefing has been copied to your clipboard. Next steps:
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 20, width: 32, height: 32, borderRadius: 8, background: "rgba(78,205,196,0.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>1</span>
                  <div style={{ fontSize: 13, color: "#d0d8e0", lineHeight: 1.6, paddingTop: 4 }}>
                    Open <strong>Claude Code</strong> in your terminal
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 20, width: 32, height: 32, borderRadius: 8, background: "rgba(78,205,196,0.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>2</span>
                  <div style={{ fontSize: 13, color: "#d0d8e0", lineHeight: 1.6, paddingTop: 4 }}>
                    <strong>Paste</strong> the briefing (Cmd+V) and press Enter
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 20, width: 32, height: 32, borderRadius: 8, background: "rgba(78,205,196,0.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>3</span>
                  <div style={{ fontSize: 13, color: "#d0d8e0", lineHeight: 1.6, paddingTop: 4 }}>
                    Claude Code runs the <strong>7-agent swarm</strong> using your Pro subscription — no API costs
                  </div>
                </div>
              </div>

              <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
                <button onClick={async () => {
                  const prompt = buildClaudeCodePrompt(sampleText);
                  try { await navigator.clipboard.writeText(prompt); setShowCopied(true); setTimeout(() => setShowCopied(false), 3000); } catch {}
                }} style={{
                  padding: "10px 20px", borderRadius: 8, border: "1px solid rgba(78,205,196,0.3)",
                  background: "rgba(78,205,196,0.1)", color: "#4ECDC4", cursor: "pointer",
                  fontSize: 13, fontWeight: 600, fontFamily: "'IBM Plex Sans', sans-serif",
                }}>
                  Copy Again
                </button>
                <button onClick={resetInvestigation} style={{
                  padding: "10px 20px", borderRadius: 8, border: "1px solid #1e2e3e",
                  background: "rgba(255,255,255,0.03)", color: "#6a8a9a", cursor: "pointer",
                  fontSize: 13, fontWeight: 600, fontFamily: "'IBM Plex Sans', sans-serif",
                }}>
                  New Investigation
                </button>
              </div>
            </div>

            {/* Show the briefing */}
            <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid #1e2e3e", padding: "16px 18px" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#e8c56a", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Sample Brief</div>
              <div style={{ fontSize: 12, color: "#8a9aaa", fontFamily: "'IBM Plex Mono', monospace", lineHeight: 1.7 }}>
                <Md text={sampleText} />
              </div>
            </div>
          </div>
        )}

        {/* API mode: Analyzing / Results phase */}
        {(phase === "analyzing" || phase === "results") && mode === "api" && (
          <div>
            <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid #1e2e3e", padding: "16px 18px", marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#e8c56a", textTransform: "uppercase", letterSpacing: 1 }}>Sample Brief</span>
                <button onClick={resetInvestigation} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid #1e2e3e", borderRadius: 6, padding: "4px 12px", cursor: "pointer", color: "#6a8a9a", fontSize: 11, fontWeight: 600 }}>
                  New Investigation
                </button>
              </div>
              <div style={{ fontSize: 12, color: "#8a9aaa", fontFamily: "'IBM Plex Mono', monospace", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>
                <Md text={sampleText} />
              </div>
            </div>

            <div style={{ fontSize: 12, fontWeight: 700, color: "#6a8a9a", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10, padding: "0 2px" }}>
              Domain Specialists ({Object.values(agentStatuses).filter(s => s === "done").length - (agentStatuses.lead === "done" ? 1 : 0)}/{AGENTS.length} complete)
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
              {AGENTS.map(a => (
                <AgentCard key={a.id} agent={a} status={agentStatuses[a.id] || "pending"} result={agentResults[a.id]} />
              ))}
            </div>

            <div style={{ fontSize: 12, fontWeight: 700, color: "#e8c56a", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10, padding: "0 2px" }}>
              Lead Investigator
            </div>
            <AgentCard
              agent={{ id: "lead", name: "Lead Investigator", icon: "🎯", color: "#e8c56a" }}
              status={agentStatuses.lead || "pending"}
              result={null}
              isLead
            />

            <SynthesisView result={synthesis} />
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
