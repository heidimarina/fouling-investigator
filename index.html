Fouling misdiagnosis can cost millions in downtime, wrong chemical treatments, or unnecessary shutdowns. Your confidence ratings carry real financial weight.

- Distinguish "strong evidence supports this" from "plausible but speculative"

CRITICAL THINKING — MECHANISM SPECIFICITY:
Do not just identify WHAT is depositing. You must think about:
- **WHY HERE?** — What is specific about this location in the process that causes deposition here and not elsewhere?
- **WHY NOW?** — What changed? Consider: feed/crude changes, routing changes, process parameter shifts, startup/shutdown transients, seasonal effects, equipment ageing, chemical program changes

- **UPSTREAM SOURCES** — Debris transport, filtration failures, carryover from upstream equipment, corrosion product migration
- **SYNERGISTIC MECHANISMS** — Your fouling type may enable or accelerate another specialist's fouling type (e.g. organic gums trapping inorganic fines, biofilm creating anaerobic zones for SRB)
`;

async function callClaude(apiKey, model, systemPrompt, userMessage, maxTokens = 2000) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model,
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: "user", content: userMessage }],
    }),
  });
  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API error ${resp.status}: ${err}`);
  }
  const data = await resp.json();
  return data.content[0].text;
}

function Md({ text }) {
  const html = useMemo(() => {
    if (!text) return "";
    marked.setOptions({ breaks: true, gfm: true });
    return marked.parse(text);
  }, [text]);
  return <div className="md" dangerouslySetInnerHTML={{ __html: html }} />;
}

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const inputStyle = { fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, padding: "10px 12px", border: "1px solid #1e2e3e", borderRadius: 6, background: "#0a1420", color: "#d0d8e0", outline: "none", width: "100%", resize: "vertical" };
  const labelStyle = { display: "block", fontSize: 11, fontWeight: 600, color: "#6a8a9a", marginBottom: 5, textTransform: "uppercase", letterSpacing: 0.8 };
  const hintStyle = { display: "block", fontSize: 10, color: "#3a5a6a", marginTop: 3, lineHeight: 1.4 };

  const physicalForms = ["", "Solid — powder/granular", "Solid — hard chunks/flakes", "Solid — layered deposit", "Paste / sludge", "Waxy solid", "Liquid — clear", "Liquid — opaque/dark", "Emulsion", "Slurry (solid + liquid)", "Other"];

  const handleSubmit = () => {
    const parts = [];
    if (form.sampleId) parts.push(`**Sample ID:** ${form.sampleId}`);
    if (form.physicalForm) parts.push(`**Physical Form:** ${form.physicalForm}`);
    if (form.appearance) parts.push(`**Appearance (colour, texture):** ${form.appearance}`);
    if (form.odor) parts.push(`**Odour:** ${form.odor}`);
    if (form.location) parts.push(`**Location Found:** ${form.location}`);
    if (form.spatialPattern) parts.push(`**Spatial Pattern of Deposit:** ${form.spatialPattern}`);
    if (form.processStream) parts.push(`**Process Stream:** ${form.processStream}`);
    if (form.conditions) parts.push(`**Operating Conditions (T, P, flow if known):** ${form.conditions}`);
    if (form.duration) parts.push(`**Duration / When First Noticed:** ${form.duration}`);
    if (form.onsetPattern) parts.push(`**Onset Pattern:** ${form.onsetPattern}`);
    if (form.recentChanges) parts.push(`**Recent Changes (process, feed, chemicals, maintenance):** ${form.recentChanges}`);
    if (form.upstreamEquipment) parts.push(`**Upstream Equipment Condition:** ${form.upstreamEquipment}`);
    if (form.triedAndFailed) parts.push(`**What Has Been Tried / Failed:** ${form.triedAndFailed}`);
    if (form.observations) parts.push(`**Additional Observations (ΔP trends, production impact, cleaning history):** ${form.observations}`);
    if (form.prelimResults) parts.push(`**Preliminary Test Results:** ${form.prelimResults}`);
    onSubmit(parts.join("\n"));
  };

  const hasSomething = form.appearance || form.location || form.physicalForm;

  return (
    <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid #1e2e3e", padding: "20px 18px" }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: "#e8c56a", marginBottom: 4 }}>Sample Description</div>
      <div style={{ fontSize: 12, color: "#4a6a7a", marginBottom: 18 }}>Describe everything you know about the fouling sample. The more detail you provide, the better the investigation. Fields marked with * are most diagnostic.</div>

      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <div>
            <label style={labelStyle}>Sample ID / Reference</label>
            <input value={form.sampleId} onChange={e => set("sampleId", e.target.value)} style={inputStyle} placeholder="e.g. REF-2026-0342" />
          </div>
          <div>
            <label style={labelStyle}>Physical Form</label>
            <select value={form.physicalForm} onChange={e => set("physicalForm", e.target.value)} style={{ ...inputStyle, cursor: "pointer" }}>
              {physicalForms.map(f => <option key={f} value={f}>{f || "Select..."}</option>)}
            </select>
          </div>
        </div>

        <div>
          <label style={labelStyle}>Appearance (colour, texture, consistency) *</label>
          <textarea value={form.appearance} onChange={e => set("appearance", e.target.value)} style={{ ...inputStyle, minHeight: 60 }} placeholder="e.g. Black, hard, layered deposit with metallic sheen on inner surface. Brittle when scraped. Shiny fragments at tube inlets." />
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <div>
            <label style={labelStyle}>Odour (if noted)</label>
            <input value={form.odor} onChange={e => set("odor", e.target.value)} style={inputStyle} placeholder="e.g. Strong H₂S smell, petroleum odour, none" />
          </div>
          <div>
            <label style={labelStyle}>Duration / When first noticed *</label>
            <input value={form.duration} onChange={e => set("duration", e.target.value)} style={inputStyle} placeholder="e.g. 3 months, discovered during turnaround" />
          </div>
        </div>

        <div>
          <label style={labelStyle}>Location found (unit, equipment, position) *</label>
          <textarea value={form.location} onChange={e => set("location", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. Crude preheat exchanger E-101 tube side, inlet end. CDU preheat train, between desalter and preflash drum." />
        </div>

        <div>
          <label style={labelStyle}>Spatial pattern of deposit *</label>
          <textarea value={form.spatialPattern} onChange={e => set("spatialPattern", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. Worst at tube inlets, uniform along tube length, concentrated under baffles, only on hot side, localized pitting under thickest deposits..." />
          <span style={hintStyle}>Where exactly in the equipment is the deposit? Inlet vs outlet? Top vs bottom? Tube side vs shell side? Uniform or localized? This is one of the most diagnostic clues.</span>
        </div>

        <div>
          <label style={labelStyle}>Process stream (what flows through)</label>
          <input value={form.processStream} onChange={e => set("processStream", e.target.value)} style={inputStyle} placeholder="e.g. Desalted crude, mix of Arab Light and Johan Sverdrup" />
        </div>

        <div>
          <label style={labelStyle}>Operating conditions (T, P, flow if known)</label>
          <input value={form.conditions} onChange={e => set("conditions", e.target.value)} style={inputStyle} placeholder="e.g. Inlet 180°C, outlet 250°C, 15 bar, ~200 m³/h" />
        </div>

        <div>
          <label style={labelStyle}>Onset pattern *</label>
          <textarea value={form.onsetPattern} onChange={e => set("onsetPattern", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. Gradual over 6 months, or sudden onset after a specific event. Did it correlate with a startup/shutdown? A crude switch? A seasonal change?" />
          <span style={hintStyle}>Sudden = likely a specific trigger event. Gradual = likely a cumulative process mechanism. Correlated with shutdowns = possible thermal cycling effect.</span>
        </div>

        <div>
          <label style={labelStyle}>Recent changes (process, feed, chemicals, routing, maintenance) *</label>
          <textarea value={form.recentChanges} onChange={e => set("recentChanges", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. Started routing coker naphtha directly to the unit 4 months ago. Changed crude blend to include 30% opportunity crude. New antifoulant chemical started." />
        </div>

        <div>
          <label style={labelStyle}>Upstream equipment condition</label>
          <textarea value={form.upstreamEquipment} onChange={e => set("upstreamEquipment", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. Desalter running well / poorly, upstream filters bypassed, tank recently cleaned, coker drum switching pattern..." />
          <span style={hintStyle}>Condition of equipment upstream of the fouled location: desalter performance, filters, tanks, columns, any bypassed equipment.</span>
        </div>

        <div>
          <label style={labelStyle}>What has been tried / what failed</label>
          <textarea value={form.triedAndFailed} onChange={e => set("triedAndFailed", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. Chemical cleaning with toluene — partially effective. Antifoulant injection — no improvement. Water wash — made it worse." />
          <span style={hintStyle}>What remediation has been attempted? What worked, what didn't? This eliminates theories and reveals clues.</span>
        </div>

        <div>
          <label style={labelStyle}>Additional observations (ΔP trends, production impact, cleaning history)</label>
          <textarea value={form.observations} onChange={e => set("observations", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. ΔP rising but heat transfer coefficient stable. Required 16 cleanings in 1987. Similar problem in parallel unit?" />
        </div>

        <div>
          <label style={labelStyle}>Preliminary test results (if any)</label>
          <textarea value={form.prelimResults} onChange={e => set("prelimResults", e.target.value)} style={{ ...inputStyle, minHeight: 50 }} placeholder="e.g. Soluble in toluene but not heptane, ash content ~15%, high Fe by XRF screening, 80% inorganic" />
        </div>
      </div>

      <button onClick={handleSubmit} disabled={disabled || !hasSomething} style={{
        width: "100%", marginTop: 18, padding: "16px 20px", borderRadius: 10, border: "none",
        cursor: hasSomething && !disabled ? "pointer" : "not-allowed",
        fontFamily: "'IBM Plex Sans', sans-serif", fontSize: 16, fontWeight: 700, letterSpacing: 0.5,
        color: "#0a1420",
        background: hasSomething && !disabled ? "linear-gradient(135deg, #e8c56a 0%, #d4a840 100%)" : "#1e2e3e",
        opacity: hasSomething && !disabled ? 1 : 0.5,
        transition: "all 0.2s ease",
      }}>
        🔬 Launch Investigation
      </button>
    </div>
  );
}

function buildClaudeCodePrompt(sampleText) {
  return `Run a fouling investigation on this sample using Claude Opus 4.6 for all agents. This is a 3-phase investigation:

**PHASE 1 — PARALLEL SPECIALIST ANALYSIS:**
Spawn 6 domain specialist agents IN PARALLEL:
1. Organic Fouling Chemist
2. Inorganic/Corrosion Specialist
3. Process Engineer
4. Contamination/External Source Analyst
5. Crude/Feedstock Chemistry Specialist
6. Thermal/Catalytic Degradation Specialist

Each specialist MUST:
- **FIRST** generate 2–4 theories based on the information available. Do NOT wait for more data. For each theory: confidence % (0–100%) with justification, mechanism explanation (including WHY HERE and WHY NOW), supporting evidence, gaps/uncertainties, recommended analytical tests (what confirms vs rules out)
- **THEN** list what information the investigating chemist could provide to sharpen the diagnosis. Frame as: "If you can check [X]: finding [Y] would raise Theory [N] confidence; finding [Z] would lower it." These are refinement opportunities, not prerequisites — the theories stand on their own.

CRITICAL THINKING REQUIREMENTS FOR ALL SPECIALISTS:
- Don't just identify WHAT is depositing — explain WHY at this location and WHY at this time
- Consider phase changes (vaporisation, condensation, crystallisation, inverse solubility, dry-point precipitation)
- Consider transient operations (startups, shutdowns, drum switches, feed changes, upsets)
- Consider upstream debris transport and filtration failures
- Consider synergistic mechanisms (your fouling type enabling another specialist's)
- If a single observation is nearly pathognomonic, weight it accordingly — don't spread confidence artificially

CONFIDENCE CALIBRATION: Fouling misdiagnosis can cost millions. An honest 35% is more valuable than a dishonest 70%.

**PHASE 2 — CHALLENGE ROUND:**
After all 6 specialists report, run a cross-review where each specialist sees the others' theories and responds with:
- Agreements/disagreements with overlapping theories
- Synergistic mechanisms (e.g. "the organic gums I identified could be binding the inorganic fines from the Corrosion Specialist")
- Missed angles that the combined evidence now suggests
- Revised confidence levels based on seeing other specialists' work

**PHASE 3 — LEAD INVESTIGATOR SYNTHESIS:**
A Lead Investigator synthesises all specialist analyses AND the challenge round into a final report:
1. Theory ranking — top 3–5 theories with confidence %, noting specialist convergence, disagreements, and synergies from the challenge round
2. Dissenting views worth preserving
3. Phased analytical plan (Phase 1: quick screening → Phase 2: targeted confirmation → Phase 3: deep characterisation). Prioritise internal methods first, fastest/easiest first.
4. External lab alert if needed
5. "What would change my mind" for top 2 theories
6. "What would sharpen this diagnosis" — things the chemist can check or provide (operating logs, DCS data, crude assays, maintenance records, water treatment data) that would immediately refine confidence on specific theories. Frame as: "If [X], Theory [N] goes up; if [Y], it goes down."

**PHASE 4 — COLLABORATIVE INVESTIGATION MODE:**
After delivering the report, stay in investigation mode. The chemist will come back with:
- Results from analytical tests you recommended
- Answers to your information requests
- Their own observations or ideas
- New data or context

When they do, UPDATE your theory ranking with revised confidence percentages, explain what the new data confirms or rules out, suggest next steps, and continue collaborating like a fellow detective working the case together. Keep the full investigation context in mind. Be direct — if a result kills a theory, say so clearly. If it confirms one, celebrate the progress and focus the next steps.

FOULING SAMPLE INVESTIGATION BRIEF:

${sampleText}`;
}

function App() {
  const [mode, setMode] = useState(() => {
    try { return localStorage.getItem("fi-mode") || "pro"; } catch { return "pro"; }
  });
  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem("fi-api-key") || ""; } catch { return ""; }
  });
  const model = "claude-opus-4-6-20250918";
  const [phase, setPhase] = useState("input"); // input | copied | analyzing | results
  const [sampleText, setSampleText] = useState("");
  const [agentStatuses, setAgentStatuses] = useState({});
  const [agentResults, setAgentResults] = useState({});
  const [synthesis, setSynthesis] = useState(null);
  const [error, setError] = useState(null);
  const [showCopied, setShowCopied] = useState(false);

  useEffect(() => { try { localStorage.setItem("fi-mode", mode); } catch {} }, [mode]);
  useEffect(() => { try { localStorage.setItem("fi-api-key", apiKey); } catch {} }, [apiKey]);

  // Pro Plan mode: copy to clipboard
  const handleProSubmit = useCallback(async (text) => {
    setSampleText(text);
    const prompt = buildClaudeCodePrompt(text);
    try {
      await navigator.clipboard.writeText(prompt);
      setShowCopied(true);
      setTimeout(() => setShowCopied(false), 3000);
      setPhase("copied");
    } catch {
      setError("Could not copy to clipboard. Please copy the briefing manually.");
      setPhase("copied");
    }
  }, []);

  // API mode: direct agent calls
  const handleApiSubmit = useCallback(async (text) => {
    if (!apiKey) { setError("Please enter your Anthropic API key."); return; }
    setSampleText(text);
    setPhase("analyzing");
    setError(null);
    setSynthesis(null);

    const briefing = `FOULING SAMPLE INVESTIGATION BRIEF\n\n${text}\n\nAnalyse this sample. Provide your theories on what it is and how it formed. Recommend specific analytical tests from the available instruments.`;

    const initStatus = {};
    AGENTS.forEach(a => { initStatus[a.id] = "pending"; });
    initStatus.lead = "pending";
    setAgentStatuses(initStatus);
    setAgentResults({});

    const results = {};
    const promises = AGENTS.map(async (agent) => {
      setAgentStatuses(p => ({ ...p, [agent.id]: "running" }));
      try {
        const result = await callClaude(apiKey, model, agent.system, briefing, 2000);
        results[agent.id] = result;
        setAgentResults(p => ({ ...p, [agent.id]: result }));
        setAgentStatuses(p => ({ ...p, [agent.id]: "done" }));
      } catch (e) {
        results[agent.id] = `Error: ${e.message}`;
        setAgentResults(p => ({ ...p, [agent.id]: `Error: ${e.message}` }));
        setAgentStatuses(p => ({ ...p, [agent.id]: "error" }));
      }
    });

    await Promise.all(promises);

    // Challenge round: specialists review each other's work
    setAgentStatuses(p => ({ ...p, lead: "running" }));
    let challengeResult = "";
    try {
      const specialistInputs = AGENTS.map(a =>
        `## ${a.name} (${a.icon})\n${results[a.id] || "No response"}`
      ).join("\n\n---\n\n");

      const challengeBriefing = `FOULING SAMPLE INVESTIGATION BRIEF\n\n${text}\n\n---\n\nALL SPECIALIST ANALYSES:\n\n${specialistInputs}\n\n---\n\nReview all specialist theories. For each domain, identify agreements, disagreements, synergistic mechanisms, and missed angles. Revise confidence levels where warranted.`;

      challengeResult = await callClaude(apiKey, model, CHALLENGE_SYSTEM, challengeBriefing, 3000);
    } catch (e) {
      challengeResult = `Challenge round error: ${e.message}`;
    }

    // Lead Investigator synthesis
    try {
      const specialistInputs = AGENTS.map(a =>
        `## ${a.name} (${a.icon})\n${results[a.id] || "No response"}`
      ).join("\n\n---\n\n");

      const leadBriefing = `FOULING SAMPLE INVESTIGATION BRIEF\n\n${text}\n\n---\n\nSPECIALIST ANALYSES:\n\n${specialistInputs}\n\n---\n\nCHALLENGE ROUND (specialists reviewing each other's work):\n\n${challengeResult}\n\n---\n\nSynthesise all specialist analyses AND the challenge round into a final investigation report. Rank theories, design the analytical plan, flag external lab needs, and compile the most impactful questions for the investigating chemist.`;

      const leadResult = await callClaude(apiKey, model, LEAD_SYSTEM, leadBriefing, 5000);
      setSynthesis(leadResult);
      setAgentStatuses(p => ({ ...p, lead: "done" }));
    } catch (e) {
      setSynthesis(`Error: ${e.message}`);
      setAgentStatuses(p => ({ ...p, lead: "error" }));
    }

    setPhase("results");
  }, [apiKey, model]);

  const resetInvestigation = () => {
    setPhase("input");
    setSampleText("");
    setAgentStatuses({});
    setAgentResults({});
    setSynthesis(null);
    setError(null);
  };

  const handleSubmit = mode === "pro" ? handleProSubmit : handleApiSubmit;

  const modeButtonStyle = (active) => ({
    padding: "8px 16px", borderRadius: 6, border: "1px solid " + (active ? "#e8c56a55" : "#1e2e3e"),
    background: active ? "rgba(232,197,106,0.1)" : "transparent",
    color: active ? "#e8c56a" : "#4a6a7a",
    cursor: "pointer", fontSize: 12, fontWeight: 600,
    fontFamily: "'IBM Plex Sans', sans-serif",
    transition: "all 0.2s ease",
  });

  return (
    <div style={{ minHeight: "100vh", background: "#0f1923" }}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

      <Header />
      <CopiedToast show={showCopied} />

      <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px 60px" }}>

        {/* Mode selector */}
        <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid #1e2e3e", padding: "14px 18px", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "#8ab4d0", textTransform: "uppercase", letterSpacing: 1 }}>Mode</span>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setMode("pro")} style={modeButtonStyle(mode === "pro")}>
              Pro Plan — via Claude Code
            </button>
            <button onClick={() => setMode("api")} style={modeButtonStyle(mode === "api")}>
              API Key — direct calls
            </button>
          </div>
          <div style={{ fontSize: 11, color: "#3a5a6a", marginTop: 8, lineHeight: 1.6 }}>
            {mode === "pro"
              ? "Generates the investigation briefing and copies it to your clipboard. Paste it into Claude Code to run the agent swarm using your Pro subscription."
              : "Calls the Anthropic API directly from this app. Requires an API key and uses pay-per-token billing."}
          </div>
        </div>

        {/* API key — only in API mode */}
        {mode === "api" && <ApiKeyInput apiKey={apiKey} setApiKey={setApiKey} />}

        {/* Model info — only in API mode */}
        {mode === "api" && (
          <div style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "center" }}>
            <span style={{ fontSize: 11, fontWeight: 600, color: "#4a6a7a", textTransform: "uppercase", letterSpacing: 0.8 }}>Model:</span>
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#e8c56a" }}>Claude Opus 4.6</span>
          </div>
        )}

        <InstrumentPanel />

        {error && (
          <div style={{ background: "rgba(255,107,107,0.1)", border: "1px solid rgba(255,107,107,0.3)", borderRadius: 8, padding: "12px 16px", marginBottom: 16, fontSize: 13, color: "#FF6B6B" }}>
            {error}
          </div>
        )}

        {/* Input phase */}
        {phase === "input" && (
          <SampleForm onSubmit={handleSubmit} disabled={mode === "api" && !apiKey} />
        )}

        {/* Pro Plan: copied phase */}
        {phase === "copied" && mode === "pro" && (
          <div>
            <div style={{ background: "rgba(78,205,196,0.06)", borderRadius: 12, border: "2px solid rgba(78,205,196,0.2)", padding: "24px", marginBottom: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                <span style={{ fontSize: 22 }}>📋</span>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#4ECDC4" }}>Briefing Ready</div>
              </div>
              <div style={{ fontSize: 13, color: "#8ab4d0", lineHeight: 1.8, marginBottom: 16 }}>
                The investigation briefing has been copied to your clipboard. Next steps:
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 20, width: 32, height: 32, borderRadius: 8, background: "rgba(78,205,196,0.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>1</span>
                  <div style={{ fontSize: 13, color: "#d0d8e0", lineHeight: 1.6, paddingTop: 4 }}>
                    Open <strong>Claude Code</strong> in your terminal
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 20, width: 32, height: 32, borderRadius: 8, background: "rgba(78,205,196,0.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>2</span>
                  <div style={{ fontSize: 13, color: "#d0d8e0", lineHeight: 1.6, paddingTop: 4 }}>
                    <strong>Paste</strong> the briefing (Cmd+V) and press Enter
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 20, width: 32, height: 32, borderRadius: 8, background: "rgba(78,205,196,0.1)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>3</span>
                  <div style={{ fontSize: 13, color: "#d0d8e0", lineHeight: 1.6, paddingTop: 4 }}>
                    Claude Code runs the <strong>7-agent investigation</strong> using your Pro subscription — no API costs. After the report, keep chatting to feed back results, bounce ideas, and narrow down the root cause together.
                  </div>
                </div>
              </div>

              <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
                <button onClick={async () => {
                  const prompt = buildClaudeCodePrompt(sampleText);
                  try { await navigator.clipboard.writeText(prompt); setShowCopied(true); setTimeout(() => setShowCopied(false), 3000); } catch {}
                }} style={{
                  padding: "10px 20px", borderRadius: 8, border: "1px solid rgba(78,205,196,0.3)",
                  background: "rgba(78,205,196,0.1)", color: "#4ECDC4", cursor: "pointer",
                  fontSize: 13, fontWeight: 600, fontFamily: "'IBM Plex Sans', sans-serif",
                }}>
                  Copy Again
                </button>
                <button onClick={resetInvestigation} style={{
                  padding: "10px 20px", borderRadius: 8, border: "1px solid #1e2e3e",
                  background: "rgba(255,255,255,0.03)", color: "#6a8a9a", cursor: "pointer",
                  fontSize: 13, fontWeight: 600, fontFamily: "'IBM Plex Sans', sans-serif",
                }}>
                  New Investigation
                </button>
              </div>
            </div>

            {/* Show the briefing */}
            <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid #1e2e3e", padding: "16px 18px" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#e8c56a", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Sample Brief</div>
              <div style={{ fontSize: 12, color: "#8a9aaa", fontFamily: "'IBM Plex Mono', monospace", lineHeight: 1.7 }}>
                <Md text={sampleText} />
              </div>
            </div>
          </div>
        )}

        {/* API mode: Analyzing / Results phase */}
        {(phase === "analyzing" || phase === "results") && mode === "api" && (
          <div>
            <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid #1e2e3e", padding: "16px 18px", marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#e8c56a", textTransform: "uppercase", letterSpacing: 1 }}>Sample Brief</span>
                <button onClick={resetInvestigation} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid #1e2e3e", borderRadius: 6, padding: "4px 12px", cursor: "pointer", color: "#6a8a9a", fontSize: 11, fontWeight: 600 }}>
                  New Investigation
                </button>
              </div>
              <div style={{ fontSize: 12, color: "#8a9aaa", fontFamily: "'IBM Plex Mono', monospace", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>
                <Md text={sampleText} />
              </div>
            </div>

            <div style={{ fontSize: 12, fontWeight: 700, color: "#6a8a9a", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10, padding: "0 2px" }}>
              Domain Specialists ({Object.values(agentStatuses).filter(s => s === "done").length - (agentStatuses.lead === "done" ? 1 : 0)}/{AGENTS.length} complete)
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
              {AGENTS.map(a => (
                <AgentCard key={a.id} agent={a} status={agentStatuses[a.id] || "pending"} result={agentResults[a.id]} />
              ))}
            </div>

            <div style={{ fontSize: 12, fontWeight: 700, color: "#e8c56a", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10, padding: "0 2px" }}>
              Lead Investigator
            </div>
            <AgentCard
              agent={{ id: "lead", name: "Lead Investigator", icon: "🎯", color: "#e8c56a" }}
              status={agentStatuses.lead || "pending"}
              result={null}
              isLead
            />

            <SynthesisView result={synthesis} />
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
